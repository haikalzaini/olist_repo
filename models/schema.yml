version: 2

models:

  # ==FACT TABLE==
  - name: fact_sales
    description: "Fact table at order_item grain"
    columns:

      - name: order_id
        tests:
          - not_null

      - name: order_item_id
        tests:
          - not_null

      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id

      - name: product_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id

      - name: price
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - order_id
              - order_item_id

  # ==DIM CUSTOMERS==
  - name: dim_customers
    columns:

      - name: customer_id
        tests:
          - not_null
          - unique

  # ==DIM PRODUCTS==
  - name: dim_products
    columns:

      - name: product_id
        tests:
          - not_null
          - unique

  # ==STAGING==
  - name: stg_orders
    columns:

      - name: order_status
        tests:
          - accepted_values:
              values: ['delivered', 'shipped', 'canceled', 'processing', 'approved', 'created', 'invoiced', 'unavailable']